- type: alertLevels
  id: stationAlerts
  defaultLevel: green
  levels:
    green:
      announcement: alert-level-green-announcement
      color: Green
      emergencyLightColor: LawnGreen
      shuttleTime: 600
      tts: true # LP edit
    blue:
      announcement: alert-level-blue-announcement
      sound: /Audio/Misc/bluealert.ogg
      color: DodgerBlue
      forceEnableEmergencyLights: true
      emergencyLightColor: DodgerBlue
      shuttleTime: 600
      tts: true # LP edit
      # Orion-Start
      alarmSound:
        path: /Audio/_Orion/Announcements/beep_beep.ogg
        params:
          pitch: 1.4
          volume: -5
          maxDistance: 10
          rolloffFactor: 2
      alarmInterval: 20
      # Orion-End
    violet:
      announcement: alert-level-violet-announcement
      sound: /Audio/Misc/notice1.ogg
      color: Violet
      emergencyLightColor: Violet
      forceEnableEmergencyLights: true
      shuttleTime: 600
      tts: true # LP edit
      # Orion-Start
      alarmSound:
        path: /Audio/_Orion/Announcements/alien.ogg
        params:
          pitch: 1.1
          volume: -5
          maxDistance: 10
          rolloffFactor: 2
      alarmInterval: 20
      # Orion-End
    yellow:
      announcement: alert-level-yellow-announcement
      sound: /Audio/Misc/notice1.ogg
      color: Yellow
      emergencyLightColor: Goldenrod
      forceEnableEmergencyLights: true
      shuttleTime: 600
      tts: true # LP edit
      # Orion-Start
      alarmSound:
        path: /Audio/_Orion/Announcements/rising.ogg
        params:
          volume: -5
          pitch: 0.89
          maxDistance: 10
          rolloffFactor: 2
      alarmInterval: 20
      # Orion-End
    red:
      announcement: alert-level-red-announcement
      sound: /Audio/Misc/redalert.ogg
      color: Red
      emergencyLightColor: Red
      forceEnableEmergencyLights: true
      shuttleTime: 600 #No reduction in time as we don't have swiping for red alert like in /tg/. Shuttle times are intended to create friction, so having a way to brainlessly bypass that would be dumb.
      tts: true # LP edit
      # Orion-Start
      alarmSound:
        path: /Audio/_Orion/Announcements/2_tone_alarm.ogg
        params:
          volume: -5
          pitch: 0.89
          maxDistance: 10
          rolloffFactor: 2
      alarmInterval: 20
      # Orion-End
    gamma:
      announcement: alert-level-gamma-announcement
      selectable: false
      sound:
        path: /Audio/Corvax/Misc/siren.ogg # Corvax: Return of the old siren sound
        params:
          volume: -2
      disableSelection: true
      color: PaleVioletRed
      emergencyLightColor: PaleVioletRed
      forceEnableEmergencyLights: true
      tts: true # LP edit
      # Orion-Start
      alarmSound:
        path: /Audio/_Orion/Announcements/overload.ogg
        params:
          volume: -5
          maxDistance: 10
          rolloffFactor: 2
      alarmInterval: 20
      # Orion-End
    delta:
      announcement: alert-level-delta-announcement
      selectable: false
      sound:
        path: /Audio/Misc/delta.ogg
        params:
          volume: -6 # Corvax: Reduce sound volume
      disableSelection: true
      color: DarkRed
      emergencyLightColor: Orange
      forceEnableEmergencyLights: true
      shuttleTime: 1200
      tts: true # LP edit
      # Orion-Start
      alarmSound:
        path: /Audio/_Orion/Announcements/angry.ogg
        params:
          volume: -5
          maxDistance: 10
          rolloffFactor: 2
      alarmInterval: 20
      # Orion-End
    epsilon:
      announcement: alert-level-epsilon-announcement
      selectable: false
      sound:
        path: /Audio/Misc/epsilon.ogg
        params:
          volume: -2
      disableSelection: true
      color: DarkViolet
      emergencyLightColor: DarkViolet
      forceEnableEmergencyLights: true
      shuttleTime: 1200
      tts: true # LP edit
      # Orion-Start
      alarmSound:
        path: /Audio/_Orion/Announcements/crashing.ogg
        params:
          pitch: 0.85
          volume: -5
          maxDistance: 10
          rolloffFactor: 2
      alarmInterval: 20
      # Orion-End
